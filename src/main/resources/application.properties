spring.application.name=bourse-azma-api
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bourse
spring.datasource.username=postgres
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Security / JWT
app.security.jwt.access-token-minutes=1000
# Login brute-force protection
app.security.login-brute-force.max-attempts=5
app.security.login-brute-force.lockout-duration-seconds=900
app.security.login-brute-force.attempt-window-seconds=900
app.security.login-brute-force.key-prefix=login-attempt
# Comma-separated proxy IPs/CIDRs allowed to supply X-Forwarded-For. Empty means headers are ignored.
app.security.trusted-proxies=
# CORS (override in production via APP_CORS_ALLOWED_ORIGINS, etc.)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age-seconds=3600
# Bootstrap Admin
app.bootstrap.admin.username=erfan
app.bootstrap.admin.email=erfan@gmail.com
app.bootstrap.admin.phone-number=09123456789
app.bootstrap.admin.first-name=erfan
app.bootstrap.admin.last-name=dn
app.bootstrap.admin.password=12345678
app.bootstrap.admin.balance=12345678
# tsetmc api
app.tsetmc.base-url=http://localhost:9000/tsetmc
app.tsetmc.connect-timeout-ms=3000
app.tsetmc.read-timeout-ms=8000
# buy/sell order
app.ui-debug-mode=${VITE_UI_DEBUG_MODE:false}
app.order-matching.enabled=true
app.order-matching.poll-interval-ms=5000
# Trading limits (Rial). Override with the matching APP_TRADING_* environment variables.
app.trading.minimum-order-value=${APP_TRADING_MINIMUM_ORDER_VALUE:5000000}
app.trading.maximum-wallet-adjustment=${APP_TRADING_MAXIMUM_WALLET_ADJUSTMENT:1000000000000}
# Market Search
app.market-search.csv-path=market.csv
# =========================
# Graceful Shutdown
# =========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.jmx.enabled=false
# =========================
# Virtual Threads (Java 21 / Project Loom)
# =========================
spring.threads.virtual.enabled=true
# =========================
# Tomcat Tuning
# =========================
server.tomcat.max-connections=80
server.tomcat.accept-count=20
server.tomcat.threads.max=25
server.tomcat.threads.min-spare=2
server.tomcat.connection-timeout=5s
# =========================
# Redis Connection Pool (requires commons-pool2)
# =========================
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=3s
# =========================
# HikariCP Connection Pool (PostgreSQL)
# =========================
spring.datasource.hikari.pool-name=BourseAzmaHikariCP
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=60000
# =========================
# JPA / Hibernate Performance
# =========================
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
