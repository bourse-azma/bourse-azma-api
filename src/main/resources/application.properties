spring.application.name=bourse-azma-api
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bourse
spring.datasource.username=postgres
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Security / JWT
app.security.jwt.secret=change-this-secret-key-at-least-32-bytes-long-for-jwt-signing
app.security.jwt.access-token-minutes=1000
app.security.cookie.secure=false
# Login brute-force protection
app.security.login-brute-force.max-attempts=5
app.security.login-brute-force.lockout-duration-seconds=900
app.security.login-brute-force.attempt-window-seconds=900
app.security.login-brute-force.key-prefix=login-attempt
# Bootstrap Admin
app.bootstrap.admin.username=erfan
app.bootstrap.admin.email=erfan@gmail.com
app.bootstrap.admin.phone-number=+989123456789
app.bootstrap.admin.national-code=1111111111
app.bootstrap.admin.first-name=erfan
app.bootstrap.admin.last-name=dn
app.bootstrap.admin.password=12345678
app.bootstrap.admin.balance=12345678
# tsetmc api
app.tsetmc.base-url=http://localhost:9000/tsetmc
app.tsetmc.connect-timeout-ms=3000
app.tsetmc.read-timeout-ms=8000
# buy/sell order
app.order-matching.enabled=true
app.order-matching.poll-interval-ms=5000
# Market Search
app.market-search.csv-path=market.csv
# =========================
# Virtual Threads (Java 21 / Project Loom)
# =========================
spring.threads.virtual.enabled=true
# =========================
# Tomcat Tuning
# =========================
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=5s
# =========================
# Redis Connection Pool (requires commons-pool2)
# =========================
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=3s
# =========================
# HikariCP Connection Pool (PostgreSQL)
# =========================
spring.datasource.hikari.pool-name=BourseAzmaHikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
# =========================
# JPA / Hibernate Performance
# =========================
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false